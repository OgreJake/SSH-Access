run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gosec
    - revive
    - misspell
    - bodyclose
    - errorlint

issues:
  exclude-rules:
    # Test files may use weaker crypto helpers and skip some error checks.
    - path: _test\.go
      linters:
        - gosec
